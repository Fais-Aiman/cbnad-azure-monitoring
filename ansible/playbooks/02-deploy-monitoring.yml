---
- name: Deploy CB-NAD monitoring stack using Docker Compose
  hosts: monitoring_servers
  become: true

  vars_files:
    - ../group_vars/monitoring.yml

  tasks:
    - name: Create monitoring directory
      file:
        path: "{{ monitoring_dir }}"
        state: directory
        owner: azureuser
        group: azureuser
        mode: '0755'

    - name: Create monitoring directory
      file:
        path: "{{ monitoring_dir }}"
        state: directory
        owner: azureuser
        group: azureuser
        mode: '0755'

    - name: Create Grafana provisioning directories
      file:
        path: "{{ item }}"
        state: directory
        owner: azureuser
        group: azureuser
        mode: '0755'
      loop:
        - "{{ monitoring_dir }}/grafana/provisioning/datasources"
        - "{{ monitoring_dir }}/grafana/provisioning/dashboards"
        - "{{ monitoring_dir }}/grafana/dashboards"

    - name: Copy Grafana Prometheus datasource provisioning file
      template:
        src: ../templates/grafana-datasource.yml.j2
        dest: "{{ monitoring_dir }}/grafana/provisioning/datasources/prometheus.yml"
        owner: azureuser
        group: azureuser
        mode: '0644'

    - name: Copy Grafana dashboard provider provisioning file
      template:
        src: ../templates/grafana-dashboard-provider.yml.j2
        dest: "{{ monitoring_dir }}/grafana/provisioning/dashboards/dashboard-provider.yml"
        owner: azureuser
        group: azureuser
        mode: '0644'

    - name: Copy Grafana Node Overview dashboard
      copy:
        src: ../files/grafana-dashboard-node.json
        dest: "{{ monitoring_dir }}/grafana/dashboards/node-overview.json"
        owner: azureuser
        group: azureuser
        mode: '0644'

    - name: Copy Docker Compose file
      template:
        src: ../templates/docker-compose.yml.j2
        dest: "{{ monitoring_dir }}/docker-compose.yml"
        owner: azureuser
        group: azureuser
        mode: '0644'

    - name: Copy Prometheus configuration
      template:
        src: ../templates/prometheus.yml.j2
        dest: "{{ monitoring_dir }}/prometheus.yml"
        owner: azureuser
        group: azureuser
        mode: '0644'

    - name: Copy Prometheus alert rules
      template:
        src: ../templates/alerts.yml.j2
        dest: "{{ monitoring_dir }}/alerts.yml"
        owner: azureuser
        group: azureuser
        mode: '0644'

    - name: Pull monitoring stack images
      command: docker compose pull
      args:
        chdir: "{{ monitoring_dir }}"

    - name: Deploy monitoring stack
      command: docker compose up -d
      args:
        chdir: "{{ monitoring_dir }}"

    - name: Show running containers
      command: docker ps --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}\t{{ '{{' }}.Ports{{ '}}' }}"
      register: docker_ps
      changed_when: false

    - name: Display running containers
      debug:
        msg: "{{ docker_ps.stdout_lines }}"
